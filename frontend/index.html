<!DOCTYPE html>
<html lang="ru">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("dkkiur.theme");
          if (t !== "dark" && t !== "light") t = "light";
          document.documentElement.setAttribute("data-theme", t);
          document.documentElement.style.backgroundColor = t === "dark" ? "#1A1B1F" : "#FAFAF7";
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ДККиУР — Дашборд</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
