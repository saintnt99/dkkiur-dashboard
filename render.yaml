services:
  - type: web
    name: dkkiur-dashboard
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: SITE_PASSWORD
        sync: false       # задаётся вручную в Render UI
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false       # подставляем Neon Postgres URL
      - key: SERVE_STATIC
        value: "1"
      - key: COOKIE_SECURE
        value: "1"
      - key: CORS_ORIGINS
        value: ""
