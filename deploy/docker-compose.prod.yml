services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://dashboard:${POSTGRES_PASSWORD}@db:5432/dashboard
      SITE_PASSWORD: ${SITE_PASSWORD:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      SERVE_STATIC: "1"
      COOKIE_SECURE: "1"
      CORS_ORIGINS: ""
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?required}
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
